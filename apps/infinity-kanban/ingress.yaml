# cert-manager 가 letsencrypt-prod ClusterIssuer 로 TLS 인증서 자동 발급
# DNS wildcard (*.oracle.shdkej.com) 이미 적용되어 별도 DNS 작업 불필요
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infinity-kanban
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - infinity.oracle.shdkej.com
      secretName: infinity-kanban-tls
  rules:
    - host: infinity.oracle.shdkej.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: infinity-kanban
                port:
                  number: 80
