apiVersion: apps/v1
kind: Deployment
metadata:
  name: reel-room
  namespace: default
  labels:
    app: reel-room
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reel-room
  template:
    metadata:
      labels:
        app: reel-room
    spec:
      # 영상 작업은 디스크 스파이크가 커서 컨트롤플레인(arm-2, OpenClaw 호스트)을 피해
      # 디스크 여유가 큰 워커 노드에 고정한다. 배포 반영: kubectl rollout restart deploy/reel-room
      nodeSelector:
        kubernetes.io/hostname: oracle-arm-1
      containers:
        - name: app
          image: ghcr.io/shdkej/video-automation:latest
          imagePullPolicy: Always
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: reel-room-env
                  key: OPENAI_API_KEY
                  optional: true
            - name: VIDAUTO_MAX_CONCURRENT_JOBS
              value: "1"
            - name: VIDAUTO_MAX_UPLOAD_MB
              value: "2048"
            - name: VIDAUTO_JOB_MAX_COUNT
              value: "10"
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: jobs
              mountPath: /app/web/jobs
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 4Gi
      volumes:
        - name: jobs
          emptyDir:
            sizeLimit: 12Gi
