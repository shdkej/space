apiVersion: apps/v1
kind: Deployment
metadata:
  name: virtue-rebirth
  namespace: default
  labels:
    app: virtue-rebirth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: virtue-rebirth
  template:
    metadata:
      labels:
        app: virtue-rebirth
    spec:
      containers:
        - name: app
          image: node:22-alpine
          imagePullPolicy: IfNotPresent
          workingDir: /app
          env:
            - name: NEXT_PUBLIC_SCORING_MODE
              value: mock
            - name: NODE_ENV
              value: production
          ports:
            - containerPort: 8030
              name: http
          command:
            - /bin/sh
            - -ec
            - |
              apk add --no-cache git
              corepack enable
              rm -rf /app
              git clone --depth=1 --branch master https://github.com/shdkej/virtue-rebirth-app.git /app
              cd /app
              pnpm install --frozen-lockfile
              NEXT_PUBLIC_SCORING_MODE=mock pnpm build
              pnpm start
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 240
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
