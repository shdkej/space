apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: control-center-cms
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/shdkej/space.git
    targetRevision: HEAD
    path: apps/control-center-cms
    directory:
      include: '{deployment.yaml,service.yaml,ingress.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
