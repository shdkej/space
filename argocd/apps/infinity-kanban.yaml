# Infinity Kanban 대시보드 ArgoCD Application
# space repo `apps/infinity-kanban/` 의 raw 매니페스트 (ConfigMap/Deployment/Service/Ingress) 를 동기화한다.
# 별도 Docker 이미지 빌드 없이 nginx:alpine + ConfigMap(index.html) 구성으로 동작하며
# 클라이언트가 GitHub raw URL에서 INTENTS.md / GATES.md 를 직접 fetch 하여 칸반으로 렌더링한다.
# 공개 URL: https://infinity.oracle.shdkej.com  (wildcard DNS + cert-manager TLS)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infinity-kanban
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/shdkej/space.git
    targetRevision: HEAD
    path: apps/infinity-kanban
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
