apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: virtue-rebirth
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/shdkej/space.git
    targetRevision: HEAD
    path: apps/virtue-rebirth
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
