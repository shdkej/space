<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#172321">
  <title>Card News Library</title>
  <style>
    :root {
      --ink: #172321;
      --muted: #63706c;
      --paper: #f7f3e8;
      --panel: #fffdf5;
      --panel-strong: #ffffff;
      --line: rgba(23, 35, 33, 0.14);
      --line-strong: rgba(23, 35, 33, 0.24);
      --green: #23483f;
      --blue: #28526b;
      --copper: #a4562b;
      --gold: #d0a85d;
      --charcoal: #172321;
      --shadow: 0 24px 70px rgba(20, 27, 25, 0.13);
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(35, 72, 63, 0.055) 1px, transparent 1px),
        linear-gradient(rgba(40, 82, 107, 0.045) 1px, transparent 1px),
        linear-gradient(132deg, #f8f4e9 0%, #eef2ed 46%, #f6efe2 100%);
      background-size: 28px 28px, 28px 28px, auto;
      font-family: "Iowan Old Style", "Noto Serif KR", "Apple SD Gothic Neo", "Malgun Gothic", Georgia, serif;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      color: inherit;
    }

    a {
      color: inherit;
    }

    .app {
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid var(--line);
      background: rgba(247, 243, 232, 0.92);
      backdrop-filter: blur(16px);
    }

    .topbar-inner {
      display: grid;
      grid-template-columns: minmax(190px, 0.55fr) minmax(280px, 1fr) auto;
      gap: 18px;
      align-items: center;
      width: min(1480px, calc(100% - 32px));
      margin: 0 auto;
      min-height: 74px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      color: #fffdf5;
      background: var(--charcoal);
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 6px;
      font: 900 16px/1 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    .brand h1 {
      margin: 0;
      font-size: 21px;
      line-height: 1.1;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font: 800 11px/1.2 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    .searchbox {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      padding: 0 14px;
      height: 44px;
      border: 1px solid var(--line-strong);
      background: rgba(255, 253, 245, 0.78);
      border-radius: 8px;
    }

    .searchbox svg {
      flex: 0 0 auto;
      color: var(--green);
    }

    .searchbox input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font: 800 14px/1.2 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    .searchbox input::placeholder {
      color: rgba(23, 35, 33, 0.46);
    }

    .metrics {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      min-width: 0;
    }

    .metric {
      min-width: 76px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      background: rgba(255, 253, 245, 0.66);
      border-radius: 8px;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    .metric b {
      display: block;
      font-size: 16px;
      line-height: 1.1;
    }

    .metric span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr) 460px;
      gap: 18px;
      width: min(1480px, calc(100% - 32px));
      margin: 0 auto;
      padding: 22px 0 48px;
      align-items: start;
    }

    .sidebar,
    .detail {
      position: sticky;
      top: 96px;
      max-height: calc(100vh - 116px);
      overflow: auto;
      scrollbar-width: thin;
    }

    .sidebar,
    .content-panel,
    .detail {
      border: 1px solid var(--line);
      background: rgba(255, 253, 245, 0.72);
      border-radius: var(--radius);
      box-shadow: 0 14px 46px rgba(22, 30, 28, 0.08);
    }

    .sidebar {
      padding: 14px;
    }

    .intro {
      margin: 0 0 18px;
      color: rgba(23, 35, 33, 0.72);
      font-size: 14px;
      line-height: 1.62;
      word-break: keep-all;
    }

    .filter-group + .filter-group {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .filter-title {
      margin: 0 0 10px;
      color: var(--muted);
      font: 900 11px/1.2 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .filter-list {
      display: grid;
      gap: 7px;
    }

    .filter-btn,
    .tag-btn,
    .sort-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 34px;
      border: 1px solid transparent;
      background: transparent;
      border-radius: 7px;
      cursor: pointer;
      text-align: left;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .filter-btn {
      padding: 7px 9px;
      font: 900 13px/1.25 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    .filter-btn span,
    .tag-btn span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .filter-btn small,
    .tag-btn small {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
    }

    .filter-btn:hover,
    .tag-btn:hover,
    .sort-btn:hover {
      border-color: var(--line-strong);
      background: rgba(35, 72, 63, 0.08);
    }

    .filter-btn.active,
    .tag-btn.active,
    .sort-btn.active {
      color: #fffdf5;
      background: var(--green);
      border-color: var(--green);
    }

    .filter-btn.active small,
    .tag-btn.active small {
      color: rgba(255,255,255,0.72);
    }

    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .tag-btn {
      max-width: 100%;
      min-height: 30px;
      padding: 6px 8px;
      font: 900 12px/1 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    .mobile-filters {
      display: none;
    }

    .content-panel {
      min-height: calc(100vh - 118px);
      overflow: hidden;
    }

    .panel-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: end;
      padding: 22px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(110deg, rgba(35, 72, 63, 0.08), transparent 42%),
        rgba(255, 253, 245, 0.64);
    }

    .panel-head h2 {
      margin: 0;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .panel-head p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      word-break: keep-all;
    }

    .sorters {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      align-items: center;
      min-width: 0;
    }

    .sort-btn {
      padding: 8px 10px;
      font: 900 12px/1 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      white-space: nowrap;
    }

    .featured {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      padding: 16px 22px 2px;
    }

    .feature-card {
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr);
      gap: 11px;
      align-items: center;
      min-height: 96px;
      padding: 9px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      box-shadow: 0 10px 24px rgba(22, 30, 28, 0.06);
    }

    .feature-card img {
      width: 78px;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      border-radius: 6px;
      background: #d8ded5;
    }

    .feature-card b {
      display: block;
      color: var(--muted);
      font: 900 10px/1 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      margin-bottom: 6px;
    }

    .feature-card strong {
      display: -webkit-box;
      overflow: hidden;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      font-size: 15px;
      line-height: 1.32;
      word-break: keep-all;
    }

    .index-tools {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 18px 22px 10px;
      color: var(--muted);
      font: 900 12px/1.2 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    .result-count {
      color: var(--green);
    }

    .row-list {
      display: grid;
      gap: 0;
      padding: 0 10px 12px;
    }

    .date-group + .date-group {
      margin-top: 10px;
    }

    .date-divider {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 12px 8px;
      color: var(--muted);
      font: 900 12px/1.2 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    .date-divider strong {
      color: var(--ink);
      font-size: 14px;
    }

    .issue-row {
      display: grid;
      grid-template-columns: 52px minmax(170px, 1fr) 118px 142px 64px 44px 38px;
      gap: 12px;
      align-items: center;
      min-height: 72px;
      padding: 9px 12px;
      border-top: 1px solid var(--line);
      border-radius: 7px;
      background: transparent;
      cursor: pointer;
      text-align: left;
      transition: background 160ms ease, transform 160ms ease, box-shadow 160ms ease;
    }

    .issue-row:hover,
    .issue-row.active {
      background: var(--panel-strong);
      box-shadow: 0 8px 24px rgba(22, 30, 28, 0.07);
    }

    .issue-row.active {
      outline: 2px solid color-mix(in srgb, var(--accent, var(--green)), transparent 55%);
      outline-offset: -2px;
    }

    .issue-row img {
      width: 42px;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      border-radius: 5px;
      background: #d8ded5;
    }

    .issue-main {
      min-width: 0;
    }

    .issue-title {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 16px;
      line-height: 1.25;
    }

    .issue-subtitle {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 5px;
      color: var(--muted);
      font: 800 12px/1.2 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    .pill {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      max-width: 100%;
      min-height: 26px;
      padding: 0 8px;
      border: 1px solid var(--line);
      color: var(--green);
      background: rgba(35, 72, 63, 0.06);
      border-radius: 999px;
      font: 900 11px/1 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mini-tags {
      display: flex;
      gap: 5px;
      min-width: 0;
      overflow: hidden;
    }

    .date-cell,
    .card-count {
      color: var(--muted);
      font: 900 12px/1 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      white-space: nowrap;
    }

    .open-icon {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      justify-self: end;
      color: #fffdf5;
      background: var(--charcoal);
      border-radius: 7px;
    }

    .empty {
      display: none;
      padding: 80px 24px;
      text-align: center;
      color: var(--muted);
      font: 900 15px/1.55 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    .empty.visible {
      display: block;
    }

    .detail {
      background: var(--panel-strong);
      overflow: hidden auto;
    }

    .detail-cover {
      position: relative;
      min-height: 250px;
      background: #d8ded5;
      overflow: hidden;
    }

    .detail-cover img {
      width: 100%;
      height: 100%;
      min-height: 250px;
      object-fit: cover;
      display: block;
    }

    .detail-cover::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 35%, rgba(0,0,0,0.48));
    }

    .detail-badge {
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 9px;
      color: #fffdf5;
      background: rgba(23, 35, 33, 0.82);
      border-radius: 7px;
      font: 900 12px/1 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    .detail-body {
      padding: 18px;
    }

    .detail-meta {
      margin: 0 0 9px;
      color: var(--muted);
      font: 900 11px/1.35 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    .detail h3 {
      margin: 0;
      font-size: 27px;
      line-height: 1.2;
      letter-spacing: 0;
      word-break: keep-all;
    }

    .takeaway {
      margin: 14px 0 0;
      padding-left: 12px;
      border-left: 4px solid var(--accent, var(--green));
      color: rgba(23, 35, 33, 0.82);
      font-size: 15px;
      line-height: 1.68;
      word-break: keep-all;
    }

    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 14px 0 0;
    }

    .detail-section {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .detail-section h4 {
      margin: 0 0 10px;
      color: var(--muted);
      font: 900 11px/1 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      text-transform: uppercase;
    }

    .viewer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .viewer-head h4 {
      margin: 0;
    }

    .viewer-hint {
      color: var(--muted);
      font: 900 11px/1 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      white-space: nowrap;
    }

    .card-viewer {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 2px 2px 12px;
      scroll-snap-type: x mandatory;
      scroll-padding-inline: 2px;
      scrollbar-width: thin;
    }

    .card-viewer a {
      position: relative;
      flex: 0 0 min(100%, 330px);
      aspect-ratio: 4 / 5;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #d8ded5;
      scroll-snap-align: start;
      box-shadow: 0 16px 34px rgba(22, 30, 28, 0.12);
    }

    .card-viewer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-viewer span {
      position: absolute;
      left: 10px;
      bottom: 10px;
      display: grid;
      place-items: center;
      min-width: 34px;
      height: 30px;
      padding: 0 8px;
      color: #fffdf5;
      background: rgba(23, 35, 33, 0.82);
      border-radius: 7px;
      font: 900 12px/1 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    .card-strip {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 7px;
    }

    .card-strip a {
      position: relative;
      display: block;
      aspect-ratio: 4 / 5;
      overflow: hidden;
      border-radius: 6px;
      background: #d8ded5;
      border: 1px solid var(--line);
    }

    .card-strip img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-strip span {
      position: absolute;
      right: 5px;
      bottom: 5px;
      display: grid;
      place-items: center;
      width: 22px;
      height: 22px;
      color: #fffdf5;
      background: rgba(23, 35, 33, 0.78);
      border-radius: 5px;
      font: 900 10px/1 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    .thread {
      margin: 0;
      color: rgba(23, 35, 33, 0.82);
      font-size: 14px;
      line-height: 1.72;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    .detail-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .action-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 12px;
      color: #fffdf5;
      background: var(--charcoal);
      border-radius: 7px;
      text-decoration: none;
      font: 900 12px/1 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    .action-link.secondary {
      color: var(--green);
      background: rgba(35, 72, 63, 0.08);
      border: 1px solid var(--line);
    }

    .drawer-close {
      display: none;
    }

    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: 220px minmax(0, 1fr);
      }

      .detail {
        position: fixed;
        z-index: 80;
        top: auto;
        right: 14px;
        bottom: 14px;
        left: 14px;
        max-height: min(82vh, 820px);
        transform: translateY(calc(100% + 28px));
        opacity: 0;
        pointer-events: none;
        transition: transform 220ms ease, opacity 220ms ease;
        box-shadow: 0 30px 90px rgba(20, 27, 25, 0.26);
      }

      body.drawer-open .detail {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
      }

      .drawer-close {
        position: absolute;
        z-index: 4;
        top: 12px;
        right: 12px;
        display: grid;
        place-items: center;
        width: 36px;
        height: 36px;
        border: 1px solid rgba(255,255,255,0.36);
        background: rgba(23, 35, 33, 0.82);
        color: #fffdf5;
        border-radius: 8px;
        cursor: pointer;
      }
    }

    @media (max-width: 900px) {
      .topbar-inner {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 12px 0;
      }

      .metrics {
        display: none;
      }

      .layout {
        display: block;
        width: min(100% - 24px, 760px);
        padding-top: 12px;
      }

      .sidebar {
        display: none;
      }

      .mobile-filters {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 4px 0 12px;
        scrollbar-width: none;
      }

      .format-tabs {
        padding-top: 0;
      }

      .mobile-filters::-webkit-scrollbar {
        display: none;
      }

      .mobile-chip {
        flex: 0 0 auto;
        min-height: 34px;
        padding: 0 11px;
        border: 1px solid var(--line);
        color: var(--green);
        background: rgba(255, 253, 245, 0.8);
        border-radius: 999px;
        font: 900 12px/1 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      }

      .mobile-chip.active {
        color: #fffdf5;
        background: var(--green);
        border-color: var(--green);
      }

      .panel-head {
        display: block;
        padding: 18px;
      }

      .sorters {
        justify-content: flex-start;
        margin-top: 14px;
      }

      .featured {
        display: flex;
        overflow-x: auto;
        padding: 14px 18px 4px;
        scrollbar-width: thin;
      }

      .feature-card {
        flex: 0 0 260px;
      }

      .index-tools {
        padding: 16px 18px 8px;
      }

      .issue-row {
        grid-template-columns: 46px minmax(0, 1fr) 34px;
        min-height: 78px;
      }

      .issue-row .pill,
      .issue-row .mini-tags,
      .issue-row .date-cell,
      .issue-row .card-count {
        display: none;
      }

      .issue-title {
        white-space: normal;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .issue-subtitle {
        white-space: nowrap;
      }
    }

    @media (max-width: 520px) {
      .topbar-inner,
      .layout {
        width: calc(100% - 18px);
      }

      .brand h1 {
        font-size: 19px;
      }

      .panel-head h2 {
        font-size: 30px;
      }

      .content-panel {
        min-height: auto;
      }

      .card-strip {
        grid-template-columns: repeat(5, 82px);
        overflow-x: auto;
        padding-bottom: 4px;
      }

      .card-viewer a {
        flex-basis: min(82vw, 340px);
      }

      .detail {
        right: 8px;
        bottom: 8px;
        left: 8px;
        max-height: 86vh;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="mark">CN</div>
          <div>
            <h1>Card News Library</h1>
            <p>INDEX VIEW · UPDATED 2026-06-21</p>
          </div>
        </div>

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")

        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

      const haystack = [
        item.title,
        item.subtitle,
        item.category,
        item.source,
        item.takeaway,
        item.thread,
        ...(item.tags || [])
      ].join(" ").toLowerCase();
      return haystack.includes(query.toLowerCase());
    }

    function getFilteredItems() {

        const tagOk = state.tag === "all" || (item.tags || []).includes(state.tag);
        return formatOk && categoryOk && monthOk && tagOk && matchesQuery(item, state.query);

    function countFor(filterName, value) {

        if (filterName === "month") return value === "all" || monthOf(item) === value;
        if (filterName === "tag") return value === "all" || (item.tags || []).includes(value);
        return true;

    }

      }

      const cardLinks = (item.cards || []).map((url, index) => `
        <a href="${escapeHtml(url)}" target="_blank" rel="noreferrer">
          <img src="${escapeHtml(url)}" alt="${escapeHtml(item.title)} 카드 ${index + 1}" loading="lazy">
          <span>${String(index + 1).padStart(2, "0")}</span>
        </a>
      `).join("");
      const largeCardLinks = (item.cards || []).map((url, index) => `
        <a href="${escapeHtml(url)}" target="_blank" rel="noreferrer" aria-label="${escapeHtml(item.title)} 카드 ${index + 1} 크게 보기">
          <img src="${escapeHtml(url)}" alt="${escapeHtml(item.title)} 카드 ${index + 1}" loading="${index === 0 ? "eager" : "lazy"}">
          <span>${String(index + 1).padStart(2, "0")} / ${(item.cards || []).length}</span>
        </a>
      `).join("");

      const tags = (item.tags || []).map((tag) => `<span class="pill">${escapeHtml(tag)}</span>`).join("");
      const firstCard = (item.cards || [])[0] || item.cover || "#";

      els.detailContent.innerHTML = `
        <div class="detail-cover" style="--accent:${escapeHtml(item.accent || "#23483f")}">
          <img src="${escapeHtml(item.cover)}" alt="${escapeHtml(item.title)} 대표 카드">
          <span class="detail-badge">${escapeHtml(item.category || "카드뉴스")} · ${(item.cards || []).length}장</span>
        </div>
        <div class="detail-body" style="--accent:${escapeHtml(item.accent || "#23483f")}">
          <p class="detail-meta">${escapeHtml(item.date || "")} · ${escapeHtml(item.source || "")}</p>
          <h3>${escapeHtml(item.title)}</h3>
          <p class="takeaway">${escapeHtml(item.takeaway || item.subtitle || "")}</p>
          <div class="detail-tags">${tags}</div>

          <div class="detail-section">
            <div class="viewer-head">
              <h4>Big card viewer</h4>
              <span class="viewer-hint">좌우로 넘겨보기</span>
            </div>
            <div class="card-viewer">${largeCardLinks}</div>
          </div>

          <div class="detail-section">
            <h4>Quick jump</h4>
            <div class="card-strip">${cardLinks}</div>
          </div>

          <div class="detail-section">
            <h4>Threads draft</h4>
            <p class="thread">${escapeHtml(item.thread || "")}</p>
          </div>

          <div class="detail-actions">
            <a class="action-link" href="${escapeHtml(firstCard)}" target="_blank" rel="noreferrer">첫 카드 열기</a>
            <a class="action-link secondary" href="#${escapeHtml(item.id)}" data-copy-id="${escapeHtml(item.id)}">ID 복사</a>
          </div>
        </div>
      `;
    }

    function selectItem(id, openDrawer = false) {
      state.selectedId = id;
      renderRows();
      if (openDrawer) document.body.classList.add("drawer-open");
    }

    function bindEvents() {
      els.search.addEventListener("input", (event) => {
        state.query = event.target.value.trim();
        renderRows();
      });

      document.addEventListener("click", async (event) => {
        const categoryButton = event.target.closest("[data-category]");
        const formatButton = event.target.closest("[data-format]");
        const monthButton = event.target.closest("[data-month]");
        const tagButton = event.target.closest("[data-tag]");
        const sortButton = event.target.closest("[data-sort]");
        const itemButton = event.target.closest("[data-id]");
        const copyLink = event.target.closest("[data-copy-id]");

        if (formatButton) {
          state.format = formatButton.dataset.format;
          renderFilters();
          renderRows();
          return;
        }

        if (categoryButton) {
          state.category = categoryButton.dataset.category;
          renderFilters();
          renderRows();
          return;
        }

        if (monthButton) {
          state.month = monthButton.dataset.month;
          renderFilters();
          renderRows();
          return;
        }

        if (tagButton) {
          state.tag = tagButton.dataset.tag;
          renderFilters();
          renderRows();
          return;
        }

        if (sortButton) {
          state.sort = sortButton.dataset.sort;
          document.querySelectorAll("[data-sort]").forEach((button) => button.classList.toggle("active", button === sortButton));
          renderRows();
          return;
        }

        if (copyLink) {
          event.preventDefault();
          await navigator.clipboard?.writeText(copyLink.dataset.copyId);
          copyLink.textContent = "ID 복사됨";
          setTimeout(() => { copyLink.textContent = "ID 복사"; }, 1200);
          return;
        }

        if (itemButton) {
          selectItem(itemButton.dataset.id, window.matchMedia("(max-width: 1180px)").matches);
        }
      });

      els.drawerClose.addEventListener("click", () => {
        document.body.classList.remove("drawer-open");
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") document.body.classList.remove("drawer-open");
      });
    }

    renderFilters();
    renderFeatured();
    renderRows();
    bindEvents();
  </script>
</body>
</html>
