<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Space Status</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f4f1;
        --ink: #2f241d;
        --muted: rgba(79, 62, 50, 0.74);
        --faint: rgba(101, 80, 66, 0.56);
        --ok: #8ba97c;
        --warn: #d9a84e;
        --bad: #c96f5f;
        --glass: rgba(255, 255, 255, 0.3);
        --glass-strong: rgba(255, 255, 255, 0.46);
        --glass-border: rgba(255, 255, 255, 0.62);
        --glass-blur: blur(16px) saturate(1.05);
        --shadow-soft: 0 12px 34px rgba(112, 92, 72, 0.14);
        --radius: 14px;
        --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
        --sans: "Pretendard", ui-sans-serif, system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        overflow: hidden;
      }

      body {
        color: var(--ink);
        font-family: var(--sans);
        font-feature-settings: "tnum";
        -webkit-font-smoothing: antialiased;
        background: linear-gradient(168deg, #fafaf8 0%, #f5f4f1 46%, #edebe6 100%);
      }

      a,
      button {
        color: inherit;
        font: inherit;
      }

      button {
        border: 0;
        background: none;
        padding: 0;
      }

      /* ─── 배경 레이어: Three.js 캔버스 ───────────── */
      .saem-canvas {
        position: fixed;
        inset: 0;
        z-index: 0;
        width: 100vw;
        height: 100svh;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.9s var(--ease);
      }

      body[data-scene="webgl"] .saem-canvas {
        opacity: 1;
      }

      /* ─── CSS 샘 fallback (WebGL 실패 시 그대로 남는다) ─ */
      .saem-fallback {
        position: fixed;
        z-index: 0;
        left: 50%;
        bottom: 34svh;
        width: 180px;
        height: 190px;
        transform: translateX(-50%);
        pointer-events: none;
      }

      body[data-scene="webgl"] .saem-fallback {
        display: none;
      }

      .saem-fallback .water {
        position: absolute;
        left: 50%;
        bottom: -14px;
        width: 300px;
        height: 74px;
        transform: translateX(-50%);
        border-radius: 50%;
        background: radial-gradient(ellipse at center, rgba(237, 235, 229, 0.9), rgba(237, 235, 229, 0) 70%);
      }

      .saem-fallback .ripple {
        position: absolute;
        left: 50%;
        bottom: 12px;
        width: 150px;
        height: 40px;
        border: 1.5px solid rgba(255, 255, 255, 0.75);
        border-radius: 50%;
        transform: translateX(-50%) scale(0.6);
        opacity: 0;
        animation: saemRipple 5.2s linear infinite;
      }

      .saem-fallback .ripple:nth-child(3) {
        animation-delay: 2.6s;
      }

      @keyframes saemRipple {
        0% {
          opacity: 0.7;
          transform: translateX(-50%) scale(0.55);
        }

        100% {
          opacity: 0;
          transform: translateX(-50%) scale(1.9);
        }
      }

      .saem-fallback .pebble {
        position: absolute;
        left: 50%;
        bottom: 22px;
        width: 128px;
        height: 96px;
        transform: translateX(-50%);
        border-radius: 52% 48% 50% 50% / 58% 60% 42% 44%;
        background: linear-gradient(155deg, #e6e0d5 8%, #d9d2c6 52%, #c6bcab 100%);
        box-shadow: 0 18px 30px rgba(128, 118, 102, 0.2);
        animation: saemBreathe 6s ease-in-out infinite;
      }

      @keyframes saemBreathe {
        0%,
        100% {
          transform: translateX(-50%) translateY(0);
        }

        50% {
          transform: translateX(-50%) translateY(-3px);
        }
      }

      .saem-fallback .moss {
        position: absolute;
        left: 50%;
        top: -12px;
        width: 74px;
        height: 34px;
        transform: translateX(-54%);
        border-radius: 50% 50% 46% 46% / 74% 78% 30% 30%;
        background: linear-gradient(160deg, #93a26b, #87975f 70%);
      }

      .saem-fallback .sprout {
        position: absolute;
        left: 44%;
        top: -30px;
        width: 3px;
        height: 20px;
        border-radius: 999px;
        background: #7fa054;
      }

      .saem-fallback .sprout::before,
      .saem-fallback .sprout::after {
        content: "";
        position: absolute;
        top: -4px;
        width: 13px;
        height: 7px;
        border-radius: 50% 50% 50% 50% / 70% 70% 30% 30%;
        background: #7fa054;
      }

      .saem-fallback .sprout::before {
        left: -11px;
        transform: rotate(-32deg);
      }

      .saem-fallback .sprout::after {
        left: 2px;
        transform: rotate(32deg);
      }

      .saem-fallback .eye {
        position: absolute;
        top: 40%;
        width: 7px;
        height: 8px;
        border-radius: 50%;
        background: #4a4238;
      }

      .saem-fallback .eye.left {
        left: 32%;
      }

      .saem-fallback .eye.right {
        right: 32%;
      }

      /* ─── HUD ──────────────────────────────────── */
      .app-shell {
        position: relative;
        z-index: 10;
        width: 100vw;
        height: 100svh;
        isolation: isolate;
      }

      .overview {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 10px;
        padding: max(16px, env(safe-area-inset-top)) 16px max(16px, env(safe-area-inset-bottom));
        transition: transform 0.62s var(--ease), opacity 0.42s var(--ease), filter 0.42s var(--ease);
      }

      body[data-mode="detail"] .overview {
        opacity: 0;
        filter: blur(12px);
        transform: scale(0.965) translateY(-18px);
        pointer-events: none;
      }

      .hero-copy {
        min-width: 0;
        justify-self: start;
        display: grid;
        align-content: start;
        gap: 12px;
        padding: 18px 22px 20px;
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        background: var(--glass);
        box-shadow: var(--shadow-soft);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
      }

      .hero-kicker,
      .hero-line,
      .hero-meta-line {
        overflow: hidden;
      }

      .hero-kicker {
        color: var(--faint);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .hero-title {
        max-width: min(15ch, 100%);
        margin: 0;
        font-size: clamp(30px, 8.6vw, 58px);
        line-height: 0.98;
        font-weight: 430;
        letter-spacing: -0.05em;
        color: rgba(61, 44, 33, 0.95);
        text-wrap: balance;
      }

      .hero-title .hero-emphasis {
        font-weight: 760;
        color: rgba(33, 24, 18, 0.98);
      }

      .hero-line {
        display: block;
      }

      .hero-line + .hero-line {
        margin-top: 0.06em;
      }

      .hero-lead {
        max-width: min(46ch, 100%);
        margin: 0;
        color: var(--muted);
        font-size: clamp(12px, 3.2vw, 15px);
        line-height: 1.42;
        letter-spacing: -0.02em;
      }

      .hero-meta {
        display: grid;
        gap: 3px;
        color: var(--faint);
        font-size: 10px;
        line-height: 1.35;
      }

      .hero-meta strong {
        color: rgba(58, 42, 32, 0.88);
        font-weight: 650;
      }

      [data-reveal] .reveal-word {
        display: inline-block;
        opacity: 0;
        transform: translate3d(0, 1.1em, 0);
        filter: blur(8px);
        animation: revealWord 0.84s var(--ease) forwards;
        animation-delay: calc(var(--word-index, 0) * 52ms + var(--reveal-delay, 0ms));
        will-change: transform, opacity, filter;
      }

      [data-reveal] .reveal-space {
        display: inline-block;
        width: 0.28em;
      }

      @keyframes revealWord {
        0% {
          opacity: 0;
          transform: translate3d(0, 1.1em, 0);
          filter: blur(8px);
        }

        100% {
          opacity: 1;
          transform: translate3d(0, 0, 0);
          filter: blur(0);
        }
      }

      /* ─── 4 status cards ───────────────────────── */
      .overview-grid {
        min-height: 0;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: repeat(2, minmax(96px, 0.5fr));
        align-self: end;
        gap: 10px;
        height: min(30svh, 264px);
      }

      .control-card {
        position: relative;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 4px;
        padding: 13px 15px 12px;
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        background: var(--glass);
        box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255, 255, 255, 0.55);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        cursor: pointer;
        text-align: left;
        transition:
          transform 0.28s var(--ease),
          border-color 0.28s var(--ease),
          background 0.28s var(--ease),
          box-shadow 0.28s var(--ease);
      }

      .control-card:hover,
      .control-card:focus-visible {
        outline: none;
        transform: translateY(-3px);
        border-color: rgba(255, 255, 255, 0.85);
        background: var(--glass-strong);
        box-shadow: 0 18px 40px rgba(112, 92, 72, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.6);
      }

      .control-card.is-active {
        animation: cardPulse 0.48s var(--ease);
      }

      @keyframes cardPulse {
        0% {
          transform: scale(1);
        }

        44% {
          transform: scale(0.965);
        }

        100% {
          transform: scale(1.015);
        }
      }

      .card-top {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }

      .card-label {
        overflow: hidden;
        color: var(--faint);
        font-size: 10px;
        font-weight: 750;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .card-mid {
        display: flex;
        align-items: baseline;
        gap: 7px;
        min-width: 0;
      }

      .card-value {
        font-size: clamp(26px, 6.4vw, 40px);
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.04em;
        color: rgba(43, 32, 24, 0.96);
      }

      .card-title {
        overflow: hidden;
        color: var(--muted);
        font-size: clamp(11px, 2.6vw, 13px);
        font-weight: 600;
        letter-spacing: -0.02em;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .card-bottom {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        color: var(--faint);
        font-size: 10px;
        font-weight: 650;
      }

      .card-bottom .card-status {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .dot {
        flex: 0 0 auto;
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--faint);
      }

      .dot.ok {
        background: var(--ok);
      }

      .dot.warn {
        background: var(--warn);
      }

      .dot.bad {
        background: var(--bad);
      }

      /* ─── detail ───────────────────────────────── */
      .detail-view {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        padding: max(16px, env(safe-area-inset-top)) 16px calc(86px + env(safe-area-inset-bottom));
        opacity: 0;
        transform: translateY(24px);
        transition: transform 0.62s var(--ease), opacity 0.42s var(--ease);
        pointer-events: none;
        z-index: 1;
      }

      body[data-mode="detail"] .detail-view {
        opacity: 1;
        transform: none;
        pointer-events: auto;
      }

      .detail-head {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        margin-bottom: 12px;
      }

      .icon-button {
        width: 38px;
        height: 38px;
        display: grid;
        place-items: center;
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        background: var(--glass);
        box-shadow: var(--shadow-soft);
        cursor: pointer;
        font-size: 18px;
        color: rgba(60, 44, 34, 0.9);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
      }

      .detail-title {
        min-width: 0;
      }

      .detail-title h1 {
        margin: 0;
        overflow: hidden;
        font-size: 22px;
        line-height: 1.08;
        font-weight: 800;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: rgba(43, 32, 24, 0.96);
      }

      .detail-title p {
        margin: 4px 0 0;
        color: var(--muted);
        display: -webkit-box;
        overflow: hidden;
        font-size: 11px;
        line-height: 1.35;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .detail-score {
        min-width: 56px;
        padding: 9px 11px;
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        background: var(--glass);
        box-shadow: var(--shadow-soft);
        font-size: 17px;
        font-weight: 800;
        text-align: center;
        color: rgba(43, 32, 24, 0.96);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
      }

      .detail-scroll {
        min-height: 0;
        overflow-y: auto;
        overscroll-behavior: contain;
        padding: 2px 0 14px;
        scrollbar-width: thin;
      }

      .detail-panel {
        display: none;
        animation: pageIn 0.42s var(--ease);
      }

      .detail-panel.is-current {
        display: block;
      }

      @keyframes pageIn {
        from {
          opacity: 0;
          transform: translateY(14px);
        }

        to {
          opacity: 1;
          transform: none;
        }
      }

      .summary-strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 10px;
      }

      .summary-tile,
      .list-row {
        border: 1px solid var(--glass-border);
        border-radius: var(--radius);
        background: var(--glass);
        box-shadow: var(--shadow-soft);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
      }

      .summary-tile {
        min-width: 0;
        padding: 11px;
      }

      .summary-k {
        overflow: hidden;
        color: var(--faint);
        font-size: 10px;
        font-weight: 800;
        text-overflow: ellipsis;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .summary-v {
        margin-top: 7px;
        overflow: hidden;
        font-size: 20px;
        font-weight: 800;
        line-height: 1;
        color: rgba(43, 32, 24, 0.96);
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .list-stack {
        display: grid;
        gap: 8px;
      }

      .list-row {
        min-width: 0;
        display: grid;
        grid-template-columns: 10px minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        padding: 12px;
        text-decoration: none;
      }

      .row-main {
        min-width: 0;
      }

      .row-name {
        overflow: hidden;
        font-size: 13px;
        font-weight: 750;
        line-height: 1.2;
        color: rgba(43, 32, 24, 0.94);
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .row-detail {
        display: -webkit-box;
        margin-top: 4px;
        overflow: hidden;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.42;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .row-meta {
        max-width: 96px;
        overflow: hidden;
        padding: 6px 9px;
        border: 1px solid var(--glass-border);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.4);
        color: rgba(86, 66, 54, 0.82);
        font-size: 10px;
        font-weight: 750;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* ─── floating nav (detail) ────────────────── */
      .floating-nav {
        position: fixed;
        left: 16px;
        right: 16px;
        bottom: max(12px, env(safe-area-inset-bottom));
        z-index: 15;
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 6px;
        padding: 6px;
        border: 1px solid var(--glass-border);
        border-radius: 999px;
        background: var(--glass);
        box-shadow: var(--shadow-soft);
        opacity: 0;
        transform: translateY(22px);
        pointer-events: none;
        transition: opacity 0.28s var(--ease), transform 0.32s var(--ease);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
      }

      body[data-mode="detail"] .floating-nav {
        opacity: 1;
        transform: none;
        pointer-events: auto;
      }

      .nav-button {
        min-width: 0;
        height: 46px;
        display: grid;
        place-items: center;
        padding: 0 10px;
        border: 1px solid transparent;
        border-radius: 999px;
        cursor: pointer;
        color: rgba(60, 44, 34, 0.82);
        transition:
          background 0.2s var(--ease),
          color 0.2s var(--ease),
          transform 0.2s var(--ease),
          border-color 0.2s var(--ease);
      }

      .nav-button:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .nav-button-label {
        overflow: hidden;
        font-size: 11px;
        font-weight: 650;
        letter-spacing: -0.01em;
        line-height: 1;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .nav-button.is-current {
        border-color: var(--glass-border);
        color: rgba(36, 27, 20, 0.98);
      }

      .nav-button.is-current .nav-button-label {
        font-weight: 800;
      }

      .nav-button:active {
        transform: translateY(1px) scale(0.98);
      }

      .transition-flash {
        position: fixed;
        inset: auto 50% 86px auto;
        z-index: 12;
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.76);
        opacity: 0;
        pointer-events: none;
        transform: translate(50%, 50%) scale(1);
      }

      .transition-flash.is-on {
        animation: flash 0.52s var(--ease);
      }

      @keyframes flash {
        0% {
          opacity: 0.9;
          transform: translate(50%, 50%) scale(1);
        }

        100% {
          opacity: 0;
          transform: translate(50%, 50%) scale(86);
        }
      }

      /* ─── responsive ───────────────────────────── */
      @media (min-width: 740px) {
        .overview {
          width: min(1160px, calc(100vw - 48px));
          margin: 0 auto;
          padding-top: 22px;
          padding-bottom: 22px;
        }

        .hero-copy {
          max-width: min(56vw, 680px);
          gap: 14px;
          padding: 22px 26px 24px;
        }

        .hero-kicker {
          font-size: 11px;
        }

        .hero-meta {
          grid-template-columns: repeat(3, minmax(0, max-content));
          gap: 10px 20px;
          font-size: 11px;
        }

        .overview-grid {
          gap: 10px;
          height: min(30vh, 286px);
        }

        .detail-view {
          width: min(900px, calc(100vw - 48px));
          margin: 0 auto;
          padding-top: 24px;
          padding-bottom: 98px;
        }

        .detail-title h1 {
          font-size: 32px;
        }

        .floating-nav {
          left: 50%;
          right: auto;
          width: min(560px, calc(100vw - 48px));
          transform: translate(-50%, 22px);
        }

        body[data-mode="detail"] .floating-nav {
          transform: translate(-50%, 0);
        }

        .saem-fallback {
          left: auto;
          right: 16vw;
          bottom: 30svh;
          transform: none;
        }
      }

      @media (min-width: 1120px) {
        .hero-copy {
          max-width: min(46vw, 620px);
        }

        .overview-grid {
          width: min(520px, 42vw);
          justify-self: start;
        }

        .saem-fallback {
          right: 18vw;
          transform: scale(1.3);
          transform-origin: bottom right;
        }
      }

      @media (max-width: 390px) {
        .overview {
          gap: 8px;
          padding-left: 12px;
          padding-right: 12px;
        }

        .hero-copy {
          padding: 15px 17px 16px;
        }

        .hero-title {
          font-size: clamp(26px, 8.8vw, 34px);
        }

        .hero-lead {
          font-size: 11px;
        }

        .hero-meta {
          font-size: 9px;
        }

        .overview-grid {
          gap: 8px;
        }

        .control-card {
          padding: 11px 12px 10px;
          border-radius: 16px;
        }

        .detail-view {
          padding-left: 12px;
          padding-right: 12px;
        }

        .summary-strip {
          grid-template-columns: 1fr;
        }

        .floating-nav {
          left: 12px;
          right: 12px;
        }

        .nav-button {
          height: 42px;
          padding: 0 8px;
        }

        .nav-button-label {
          font-size: 9px;
        }
      }

      @media (max-width: 639px) {
        .overview-grid {
          height: min(30svh, 236px);
        }

        .saem-fallback {
          bottom: 38svh;
          transform: translateX(-50%) scale(0.82);
          transform-origin: bottom center;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>
  <body data-mode="overview">
    <canvas class="saem-canvas" id="saemCanvas" aria-hidden="true"></canvas>

    <div class="saem-fallback" aria-hidden="true">
      <div class="water"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="pebble">
        <div class="moss"></div>
        <div class="sprout"></div>
        <div class="eye left"></div>
        <div class="eye right"></div>
      </div>
    </div>

    <main class="app-shell">
      <section class="overview" aria-label="Status overview">
        <header class="hero-copy" id="heroCopy" aria-label="Space status hero">
          <div class="hero-kicker" id="heroKicker" data-reveal="words" style="--reveal-delay: 40ms">Space status</div>
          <h1 class="hero-title" id="heroTitle">
            <span class="hero-line" id="heroLineOne" data-reveal="words" style="--reveal-delay: 120ms">All systems</span>
            <span class="hero-line hero-emphasis" id="heroLineTwo" data-reveal="words" style="--reveal-delay: 240ms">loading now</span>
          </h1>
          <p class="hero-lead" id="heroLead" data-reveal="words" style="--reveal-delay: 360ms">
            Surfaces, agent lanes, and deploy targets in one quiet view.
          </p>
          <div class="hero-meta" id="heroMeta">
            <div class="hero-meta-line" id="heroMetaScore" data-reveal="words" style="--reveal-delay: 520ms">Score / loading</div>
            <div class="hero-meta-line" id="heroMetaStats" data-reveal="words" style="--reveal-delay: 620ms">Surfaces / loading</div>
            <div class="hero-meta-line" id="updatedAt" data-reveal="words" style="--reveal-delay: 720ms">Updated / loading</div>
          </div>
        </header>

        <section class="overview-grid" id="overviewGrid" aria-label="Four status cards"></section>
      </section>

      <section class="detail-view" aria-label="Status detail">
        <header class="detail-head">
          <button class="icon-button" id="backButton" type="button" aria-label="첫 화면으로 돌아가기">‹</button>
          <div class="detail-title">
            <h1 id="detailTitle">Status</h1>
            <p id="detailSub">Select a card.</p>
          </div>
          <div class="detail-score" id="detailScore">--</div>
        </header>

        <div class="detail-scroll" id="detailScroll">
          <section class="detail-panel" id="panel-system" aria-label="System detail"></section>
          <section class="detail-panel" id="panel-surfaces" aria-label="Surfaces detail"></section>
          <section class="detail-panel" id="panel-agents" aria-label="Agents detail"></section>
          <section class="detail-panel" id="panel-deploy" aria-label="Deploy detail"></section>
        </div>
      </section>

      <nav class="floating-nav" id="floatingNav" aria-label="Detail navigation"></nav>
      <div class="transition-flash" id="transitionFlash" aria-hidden="true"></div>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const tabs = [
        { id: "system", label: "System" },
        { id: "surfaces", label: "Surfaces" },
        { id: "agents", label: "Agents" },
        { id: "deploy", label: "Deploy" },
      ];
      let currentTab = "system";
      let model = null;

      const safe = (value) =>
        String(value ?? "").replace(/[&<>"']/g, (ch) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        })[ch]);

      const host = (url) => {
        try {
          return new URL(url).hostname;
        } catch (error) {
          return url || "";
        }
      };

      const stamp = (iso) => {
        if (!iso) return "--";
        return new Date(iso).toLocaleString("ko-KR", {
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });
      };

      const stateClass = (state) => (state === "ok" ? "ok" : state === "warn" ? "warn" : "bad");
      const stateLabel = (state) => (state === "ok" ? "Operational" : state === "warn" ? "Attention" : "Down");

      function applyReveal(root) {
        if (!root) return;
        const targets = root.querySelectorAll("[data-reveal]");
        targets.forEach((el) => {
          const source = el.dataset.sourceText || el.textContent;
          const words = String(source || "").trim().split(/\s+/).filter(Boolean);
          el.dataset.sourceText = source;
          el.textContent = "";
          words.forEach((word, index) => {
            const span = document.createElement("span");
            span.className = "reveal-word";
            span.style.setProperty("--word-index", index);
            span.textContent = word;
            el.appendChild(span);
            if (index < words.length - 1) {
              const gap = document.createElement("span");
              gap.className = "reveal-space";
              gap.textContent = " ";
              el.appendChild(gap);
            }
          });
        });
      }

      function flash() {
        const el = $("transitionFlash");
        el.classList.remove("is-on");
        void el.offsetWidth;
        el.classList.add("is-on");
      }

      function summaryTile(key, value) {
        return `
          <div class="summary-tile">
            <div class="summary-k">${safe(key)}</div>
            <div class="summary-v">${safe(value)}</div>
          </div>
        `;
      }

      function row(item, meta, href) {
        const tag = href ? "a" : "div";
        const attrs = href ? ` href="${safe(href)}"` : "";
        return `
          <${tag} class="list-row"${attrs}>
            <span class="dot ${stateClass(item.state)}"></span>
            <div class="row-main">
              <div class="row-name">${safe(item.name)}</div>
              <div class="row-detail">${safe(item.detail || host(item.url) || item.hosting || "")}</div>
            </div>
            <div class="row-meta">${safe(meta)}</div>
          </${tag}>
        `;
      }

      function card(item) {
        return `
          <button class="control-card" type="button" data-tab="${safe(item.id)}" aria-label="${safe(item.label)} 상세 보기">
            <span class="card-top">
              <span class="dot ${stateClass(item.state)}"></span>
              <span class="card-label">${safe(item.label)}</span>
            </span>
            <span class="card-mid">
              <span class="card-value">${safe(item.value)}</span>
              <span class="card-title">${safe(item.title)}</span>
            </span>
            <span class="card-bottom">
              <span class="card-status">${safe(item.status)}</span>
            </span>
          </button>
        `;
      }

      function buildModel(data) {
        const overall = data.overall || {};
        const checks = data.checks || [];
        const agents = data.agents || [];
        const deployments = data.deployments || [];
        const okChecks = checks.filter((item) => item.state === "ok").length;
        const okAgents = agents.filter((item) => item.state === "ok").length;
        const avgLatency = checks.length
          ? Math.round(checks.reduce((sum, item) => sum + (item.latencyMs || 0), 0) / checks.length)
          : 0;
        const score = Number.isFinite(Number(overall.score)) ? Number(overall.score) : 0;
        const deployOk = deployments.filter((item) => item.state === "ok").length;

        return {
          generatedAt: data.generatedAt,
          overallState: overall.state || "ok",
          overallLabel: overall.label || "Status feed loaded.",
          score,
          okChecks,
          totalChecks: checks.length,
          cards: [
            {
              id: "system",
              label: "System",
              value: score,
              title: "/ 100",
              status: stateLabel(overall.state),
              state: overall.state || "ok",
            },
            {
              id: "surfaces",
              label: "Surfaces",
              value: `${okChecks}/${checks.length}`,
              title: "OK",
              status: `${avgLatency}ms avg`,
              state: okChecks === checks.length ? "ok" : "warn",
            },
            {
              id: "agents",
              label: "Agents",
              value: `${okAgents}/${agents.length}`,
              title: "loops",
              status: okAgents === agents.length ? "all quiet" : "check lanes",
              state: okAgents === agents.length ? "ok" : "warn",
            },
            {
              id: "deploy",
              label: "Deploy",
              value: `${deployOk}/${deployments.length}`,
              title: "targets",
              status: deployOk === deployments.length ? "all live" : "check targets",
              state: deployOk === deployments.length ? "ok" : "warn",
            },
          ],
          panels: {
            system: {
              title: "System Health",
              score,
              sub: overall.label || "Status feed loaded.",
              summary: [
                ["Score", `${score}/100`],
                ["Surfaces", checks.length],
                ["Latency", `${avgLatency}ms`],
              ],
              rows: [
                { name: "Overall", state: overall.state || "ok", detail: overall.label || "Feed loaded.", meta: stateLabel(overall.state) },
                { name: "Generated", state: "ok", detail: `status.json · ${stamp(data.generatedAt)}`, meta: "fresh" },
                { name: "Coverage", state: "ok", detail: `${checks.length} surfaces, ${agents.length} agent lanes, ${deployments.length} deploy targets`, meta: "mapped" },
              ],
            },
            surfaces: {
              title: "Live Surfaces",
              score: `${okChecks}/${checks.length}`,
              sub: "처음 보는 사람이 실제 접점 상태를 바로 이해하는 목록입니다.",
              summary: [
                ["OK", okChecks],
                ["Total", checks.length],
                ["Avg", `${avgLatency}ms`],
              ],
              rows: checks.map((item) => ({
                ...item,
                meta: item.latencyMs ? `${item.latencyMs}ms` : stateLabel(item.state),
                href: item.url,
              })),
            },
            agents: {
              title: "Agent Lanes",
              score: `${okAgents}/${agents.length}`,
              sub: "정적 페이지 뒤에서 반복적으로 굴러가는 작업 레인입니다.",
              summary: [
                ["OK", okAgents],
                ["Loops", agents.length],
                ["Mode", "silent"],
              ],
              rows: agents.map((item) => ({ ...item, meta: stateLabel(item.state) })),
            },
            deploy: {
              title: "Deploy Lane",
              score: `${deployOk}/${deployments.length}`,
              sub: "각 표면이 어디에 올라가 있고 어떤 경로로 노출되는지 보여줍니다.",
              summary: [
                ["OK", deployOk],
                ["Targets", deployments.length],
                ["Route", "edge"],
              ],
              rows: deployments.map((item) => ({
                name: item.name,
                state: item.state,
                detail: `${host(item.url)} · ${item.hosting || "hosting"} · ${stamp(item.updatedAt)}`,
                meta: item.distribution || item.hosting || "deploy",
                href: item.url,
              })),
            },
          },
        };
      }

      function renderPanels() {
        Object.entries(model.panels).forEach(([id, panel]) => {
          $(`panel-${id}`).innerHTML = `
            <div class="summary-strip">
              ${panel.summary.map(([key, value]) => summaryTile(key, value)).join("")}
            </div>
            <div class="list-stack">
              ${panel.rows.map((item) => row(item, item.meta, item.href)).join("")}
            </div>
          `;
        });
      }

      function setTab(id, mode = "detail") {
        currentTab = id;
        const panel = model.panels[id];
        if (!panel) return;

        flash();
        document.body.dataset.mode = mode;
        $("detailTitle").textContent = panel.title;
        $("detailSub").textContent = panel.sub;
        $("detailScore").textContent = panel.score;
        $("detailScroll").scrollTop = 0;

        document.querySelectorAll(".detail-panel").forEach((el) => {
          el.classList.toggle("is-current", el.id === `panel-${id}`);
        });
        document.querySelectorAll(".nav-button").forEach((el) => {
          el.classList.toggle("is-current", el.dataset.tab === id);
        });
        document.querySelectorAll(".control-card").forEach((el) => {
          el.classList.toggle("is-active", el.dataset.tab === id);
        });
      }

      function heroLines(state, okChecks, totalChecks) {
        if (state === "ok") return ["All systems", "quiet & running"];
        if (state === "warn") return ["Some surfaces", "need attention"];
        return [`${totalChecks - okChecks} surfaces`, "are down now"];
      }

      function startSaemScene(mood) {
        import("./assets/saem-scene.js")
          .then((module) => {
            const scene = module.initSaemScene({ canvas: $("saemCanvas"), mood });
            if (!scene) console.info("Saem scene unavailable — CSS fallback stays.");
          })
          .catch(() => {
            console.info("Saem scene module failed to load — CSS fallback stays.");
          });
      }

      function render(data) {
        model = buildModel(data);
        const [lineOne, lineTwo] = heroLines(model.overallState, model.okChecks, model.totalChecks);
        $("heroKicker").textContent = "Space status";
        $("heroLineOne").textContent = lineOne;
        $("heroLineTwo").textContent = lineTwo;
        $("heroLead").textContent = model.overallLabel;
        $("heroMetaScore").innerHTML = `<strong>Score</strong> / ${safe(String(model.score))} · 100`;
        $("heroMetaStats").innerHTML = `<strong>Surfaces</strong> / ${safe(`${model.okChecks}/${model.totalChecks}`)} OK`;
        $("updatedAt").innerHTML = `<strong>Updated</strong> / ${safe(stamp(model.generatedAt))}`;
        $("overviewGrid").innerHTML = model.cards.map(card).join("");
        $("floatingNav").innerHTML = [
          `
            <button class="nav-button is-home" type="button" data-action="home" aria-label="Home">
              <span class="nav-button-label">Home</span>
            </button>
          `,
          ...tabs.map((tab) => `
            <button class="nav-button" type="button" data-tab="${tab.id}" aria-label="${tab.label}">
              <span class="nav-button-label">${tab.label}</span>
            </button>
          `),
        ].join("");

        renderPanels();

        document.querySelectorAll(".control-card").forEach((el) => {
          el.addEventListener("click", () => setTab(el.dataset.tab));
        });
        document.querySelectorAll(".nav-button").forEach((el) => {
          el.addEventListener("click", () => {
            if (el.dataset.action === "home") {
              flash();
              document.body.dataset.mode = "overview";
              return;
            }
            setTab(el.dataset.tab);
          });
        });
        $("backButton").addEventListener("click", () => {
          flash();
          document.body.dataset.mode = "overview";
        });

        applyReveal($("heroCopy"));
        startSaemScene(model.overallState);
      }

      fetch("./status.json", { cache: "no-store" })
        .then((response) => response.json())
        .then(render)
        .catch(() => {
          $("heroLineTwo").textContent = "feed unavailable";
          $("heroMetaScore").innerHTML = "<strong>Score</strong> / --";
          $("heroMetaStats").innerHTML = "<strong>Surfaces</strong> / waiting";
          $("updatedAt").innerHTML = "<strong>Updated</strong> / unavailable";
          $("overviewGrid").innerHTML = card({
            id: "system",
            label: "System",
            value: "--",
            title: "waiting",
            status: "status.json unavailable",
            state: "warn",
          });
          applyReveal($("heroCopy"));
          startSaemScene("warn");
        });
    </script>
  </body>
</html>
